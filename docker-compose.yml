version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    ports:
      - "5010:5010"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-changeme}
      PHOTO_FOLDER: /photos
      DEFAULT_DAYS: ${DEFAULT_DAYS:-30}
      # Database configuration (the app reads DB_HOST/DB_USER/DB_PASSWORD/DB_NAME)
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-food_db}
      # Optional: timezone for DB datetime conversions and OpenAI wait time
      DB_TZ_DATES: ${DB_TZ_DATES:-UTC}
      WAIT_TIME_OPEANAI_API: ${WAIT_TIME_OPEANAI_API:-5}
    volumes:
      - ./src/food_recognition/static/uploads:/app/food_recognition/static/uploads
      - ./photos:/photos

volumes: {}
