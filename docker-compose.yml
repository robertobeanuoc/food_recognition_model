version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    ports:
      - "5010:5010"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-changeme}
      PHOTO_FOLDER: /photos
      DEFAULT_DAYS: ${DEFAULT_DAYS:-30}
      # Configure these to point to your existing MySQL instance
      MYSQL_HOST: ${MYSQL_HOST:-127.0.0.1}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-food_db}
    volumes:
      - ./src/food_recognition/static/uploads:/app/food_recognition/static/uploads
      - ./photos:/photos

volumes: {}
